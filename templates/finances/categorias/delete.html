{% extends 'layouts/main.html' %}

{% block title %}Excluir categoria{% endblock %}

{% block content %}
<div class="mb-4">
    <h1 class="fw-bold mb-1">Excluir categoria</h1>
    <p class="text-muted mb-0">Confirme a exclusão da categoria.</p>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <p>
            Tem certeza que deseja excluir a categoria
            <strong>{{ categoria.nome }}</strong>?
        </p>

        <form method="post">
            {% csrf_token %}

            <button type="submit" class="btn btn-danger">
                Excluir
            </button>

            <a href="{% url 'finances:categoria_list' %}" class="btn btn-outline-secondary">
                Cancelar
            </a>
        </form>
    </div>
</div>
{% endblock %}
