{% extends 'layouts/main.html' %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="mb-4">
    <h1 class="fw-bold">Dashboard financeiro</h1>
    <p class="text-muted mb-0">
        Resumo geral da sua vida financeira.
    </p>
</div>

<div class="row g-4">
    <div class="col-md-3">
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <p class="text-muted mb-1">Receitas</p>
                <h3 class="fw-bold">R$ 0,00</h3>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <p class="text-muted mb-1">Despesas</p>
                <h3 class="fw-bold">R$ 0,00</h3>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <p class="text-muted mb-1">Saldo</p>
                <h3 class="fw-bold">R$ 0,00</h3>
            </div>
        </div>
    </div>

    <div class="col-md-3">
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <p class="text-muted mb-1">Patrimônio</p>
                <h3 class="fw-bold">R$ 0,00</h3>
            </div>
        </div>
    </div>
</div>
{% endblock %}
