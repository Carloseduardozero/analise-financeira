{% extends 'layouts/auth.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center min-vh-100">

    <div class="card bg-secondary-subtle border-0 shadow-lg" style="width: 420px; border-radius: 16px;">
        <div class="card-body p-5">

            <h1 class="text-center text-dark fw-bold mb-4">Entrar</h1>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold text-dark">Usuário</label>
                    <input type="text" name="username" class="form-control form-control-lg">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold text-dark">Senha</label>
                    <input type="password" name="password" class="form-control form-control-lg">
                </div>

                <button type="submit" class="btn btn-dark btn-lg w-100">
                    Entrar
                </button>
            </form>

            <p class="text-center mt-4 mb-0 text-dark">
                Não tem conta?
                <a href="{% url 'accounts:register' %}">Criar conta</a>
            </p>

        </div>
    </div>

</div>
{% endblock %}
